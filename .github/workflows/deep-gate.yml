name: Deep Gate (manual)

# Manually-triggered deep gate (workflow_dispatch ONLY — no cron / schedule, per
# docs/CI_CD_IMPROVEMENT_PLAN.md §0). Runs the slow / environment-sensitive checks
# that deliberately do NOT gate every PR: full E2E incl. accessibility, the
# cold-start + old-DB migration smokes, and the informational dependency scan
# (moved here from the PR pipeline). Trigger from the Actions tab or with
# `gh workflow run deep-gate.yml --ref <branch>`.
#
# Visual regression (Phase 4.2) runs as the opt-in `visual-linux` job below —
# manual-only, gated behind the `run_visual` input, and NEVER a required PR check.
# The committed PNGs are split by platform (e2e/__screenshots__/{win32,linux}/);
# the Linux baselines are generated by this workflow's `generate` mode and
# committed by the owner after review (see docs/ci_cd_phase4_2/PLANNING.md).
on:
  workflow_dispatch:
    inputs:
      run_visual:
        description: 'Run the Linux visual regression job'
        type: boolean
        default: false
      visual_mode:
        description: 'Visual mode: compare against committed Linux baselines, or generate new ones'
        type: choice
        options: [compare, generate]
        default: compare

jobs:
  full-e2e:
    name: Full E2E incl. accessibility (Chromium)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install npm dependencies
      run: npm ci

    - name: Build Bootstrap-customized CSS
      run: npm run build:css

    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    # Run every spec EXCEPT the two visual ones (visual.spec.ts,
    # visual-baseline-thumbnails.spec.ts) — their committed baselines are
    # Windows-rendered and diff ~100% on ubuntu until Phase 4.2 lands a
    # Linux baseline set. Everything else runs, accessibility included; this is a
    # manual gate, so a human reads the report (known-red nav-dropdown may fail).
    - name: Run full suite (minus visual)
      run: |
        SPECS=$(ls e2e/*.spec.ts | grep -vE 'visual' | tr '\n' ' ')
        echo "Running: $SPECS"
        npx playwright test --project=chromium $SPECS

    - name: Upload Playwright artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: deep-gate-full-e2e
        path: artifacts/playwright
        retention-days: 7

  cold-start:
    name: Cold start (missing DB) smoke
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Fresh-clone / first-run path: no data/database.db present. The real app.py
    # startup must build the schema from scratch and serve the welcome page.
    - name: Boot with no database.db and assert GET / -> 200
      run: |
        export DB_FILE=artifacts/deep-gate/cold-start.db
        mkdir -p "$(dirname "$DB_FILE")"
        rm -f "$DB_FILE" "$DB_FILE-wal" "$DB_FILE-shm" "$DB_FILE-journal"
        DB_FILE="$DB_FILE" FLASK_USE_RELOADER=0 python app.py &
        APP_PID=$!
        code=000
        for _ in $(seq 1 30); do
          code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/ || echo 000)
          [ "$code" = "200" ] && break
          sleep 2
        done
        kill "$APP_PID" 2>/dev/null || true
        echo "cold start: GET / -> $code"
        [ "$code" = "200" ]

  old-db-migration:
    name: Old-DB migration compatibility
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Generate a pre-migration DB (no exercise_order, no add_*_table tables) with a
    # seeded program row, then boot the real app.py. The startup ALTERs / add_*_table
    # helpers must upgrade it in place and serve both the welcome and plan pages.
    - name: Generate historical-schema DB, boot, assert upgrade
      run: |
        export DB_FILE=artifacts/deep-gate/old-schema.db
        python tests/fixtures/make_old_schema_db.py --output "$DB_FILE"
        DB_FILE="$DB_FILE" FLASK_USE_RELOADER=0 python app.py &
        APP_PID=$!
        root=000
        for _ in $(seq 1 30); do
          root=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/ || echo 000)
          [ "$root" = "200" ] && break
          sleep 2
        done
        plan=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/workout_plan || echo 000)
        kill "$APP_PID" 2>/dev/null || true
        echo "old-DB migration: GET / -> $root ; GET /workout_plan -> $plan"
        [ "$root" = "200" ] && [ "$plan" = "200" ]
        python - <<'PY'
        import os
        import sqlite3

        db_file = os.environ["DB_FILE"]
        con = sqlite3.connect(db_file)
        try:
            columns = {
                row[1]
                for row in con.execute("PRAGMA table_info(user_selection)").fetchall()
            }
            required_columns = {
                "exercise_order",
                "superset_group",
                "execution_style",
                "time_cap_seconds",
            }
            missing_columns = sorted(required_columns - columns)
            if missing_columns:
                raise SystemExit(f"missing migrated columns: {missing_columns}")

            required_tables = {
                "progression_goals",
                "volume_plans",
                "muscle_volumes",
                "user_profile",
                "user_profile_lifts",
                "user_profile_preferences",
                "body_composition_snapshots",
                "learned_strength_calibrations",
                "user_calibration_settings",
                "program_backups",
                "program_backup_items",
            }
            tables = {
                row[0]
                for row in con.execute(
                    "SELECT name FROM sqlite_master WHERE type='table'"
                ).fetchall()
            }
            missing_tables = sorted(required_tables - tables)
            if missing_tables:
                raise SystemExit(f"missing migrated tables: {missing_tables}")

            row = con.execute(
                """
                SELECT routine, exercise, sets, min_rep_range, max_rep_range, rir, rpe, weight
                FROM user_selection
                WHERE routine = ? AND exercise = ?
                """,
                ("Legacy Routine", "Legacy Bench Press"),
            ).fetchone()
            expected = ("Legacy Routine", "Legacy Bench Press", 3, 6, 8, 2, 8.0, 100.0)
            if row != expected:
                raise SystemExit(f"legacy row mismatch: {row!r}")
        finally:
            con.close()
        PY

  visual-linux:
    name: Visual regression (Linux baselines)
    # Opt-in only: a normal deep-gate run skips this unless run_visual=true. This
    # is NOT a required PR check (workflow_dispatch-only; an if:-gated job cannot
    # block merge). Visual specs stay manual deep gate, per Phase 4.2.
    if: ${{ inputs.run_visual }}
    # PINNED to ubuntu-24.04 (NOT ubuntu-latest): the generate and compare runs
    # must share one runner image so the renderer (Chromium build + bundled fonts
    # + freetype) matches by construction. A GitHub image promotion must not
    # silently move fonts and red the gate. This MUST match the image used to
    # generate the committed e2e/__screenshots__/linux/ baselines.
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install npm dependencies
      run: npm ci

    - name: Build Bootstrap-customized CSS
      run: npm run build:css

    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    # Fail fast if the committed visual seed is missing — prepare_visual_db.py
    # would otherwise fall back to data/database.db (DEFAULT_SOURCE) and could
    # render real data into a baseline artifact.
    - name: Assert committed visual seed present
      run: test -f e2e/fixtures/database.visual.seed.db

    # Run ONLY the two visual specs. PW_VISUAL_SEED=1 makes playwright.config.ts
    # seed the throwaway DB with the plan-bearing visual seed (prepare_visual_db.py)
    # in the webServer command before Flask opens it — no per-spec runtime DB
    # rewrite. generate mode writes baselines under e2e/__screenshots__/linux/
    # (via the {platform} snapshotPathTemplate); compare diffs against them.
    - name: Run visual specs
      env:
        PW_VISUAL_SEED: '1'
      run: |
        MODE="${{ inputs.visual_mode }}"
        UPDATE=""; [ "$MODE" = "generate" ] && UPDATE="--update-snapshots"
        echo "Visual mode: $MODE"
        npx playwright test --project=chromium \
          e2e/visual.spec.ts e2e/visual-baseline-thumbnails.spec.ts $UPDATE

    # generate → upload the freshly rendered Linux baselines for owner review+commit.
    # CI never pushes to main (branch-protected) — every pixel change is committed
    # by a human after downloading and inspecting this artifact.
    - name: Upload generated Linux baselines
      if: ${{ inputs.visual_mode == 'generate' }}
      uses: actions/upload-artifact@v4
      with:
        name: visual-baselines-linux
        path: e2e/__screenshots__/linux/**
        retention-days: 14

    # compare (or generate) failure → upload report + actual/expected/diff PNGs.
    - name: Upload Playwright report + diffs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: visual-linux-report
        path: artifacts/playwright
        retention-days: 7

  dependency-health:
    name: Dependency Health Check
    runs-on: ubuntu-latest

    # Moved out of the required PR pipeline (Phase 4.5) — outdated/safety scans are
    # informational and don't belong on the critical merge path.
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Check for outdated packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip list --outdated
      continue-on-error: true

    - name: Check package vulnerabilities
      run: |
        pip install safety
        safety check --json || true
      continue-on-error: true
