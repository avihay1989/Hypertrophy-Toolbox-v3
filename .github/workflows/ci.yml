name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run pip-audit
      run: |
        pip install pip-audit
        # CVE-2026-3219 in pip itself has no Fix Version yet (upstream has
        # not released a patched pip). Remove --ignore-vuln once `pip`
        # publishes a fix.
        pip-audit --desc --ignore-vuln CVE-2026-3219
      continue-on-error: false

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pylint
        
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names, plus
        # the flipped-to-blocking rules: F811 (redefinition), E711 (== None),
        # E712 (== True/False), F401 (unused import). F811/E711/E712 sat at ~0;
        # F401 was flipped after a guardrailed cleanup PR drove its 56 findings to
        # 0 (removed unused test/source imports + deleted the stray replace.py).
        flake8 . --count --select=E9,F63,F7,F82,F811,E711,E712,F401 --show-source --statistics --exclude=.venv,venv,env,.git,__pycache__,node_modules
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=.venv,venv,env,.git,__pycache__,node_modules

    # MEASURE-ONLY / NON-BLOCKING (Phase 3, docs/ci_cd_phase3/PLANNING.md). Surfaces
    # the hardened-diagnostic backlog without failing the build. F811/E711/E712/F401
    # are now ALL BLOCKING in the "Lint with flake8" step above. The remaining
    # measured-only diagnostic is F841 — the expected `except ... as e` logging idiom
    # (logger.exception captures the active exception implicitly), NOT a flip candidate.
    - name: Flake8 diagnostics (non-blocking, measure-only)
      continue-on-error: true
      run: |
        EXCL=".venv,venv,env,.git,__pycache__,node_modules"
        flake8 . --select=F841 --count --statistics --exclude="$EXCL" > flake8_idiom.txt 2>&1 || true
        IDIOM=$(tail -1 flake8_idiom.txt | tr -d '[:space:]')
        echo "::notice title=flake8 diagnostics (non-blocking)::F841 idiom=$IDIOM"
        {
          echo "### flake8 diagnostics (non-blocking — measure-only)"
          echo "- **F841**: $IDIOM — expected \`except ... as e\` idiom, not a flip candidate"
        } >> "$GITHUB_STEP_SUMMARY"
        echo "===== F841 (idiom) ====="; cat flake8_idiom.txt

    - name: Upload flake8 diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: static-analysis-flake8
        path: |
          flake8_idiom.txt
        retention-days: 14

  frontend-build:
    name: Frontend Build (npm ci + SCSS)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: Build Bootstrap-customized CSS
      run: npm run build:css

  e2e-smoke:
    name: E2E Smoke (Chromium)
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install npm dependencies
      run: npm ci

    - name: Build Bootstrap-customized CSS
      run: npm run build:css

    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    - name: Run smoke spec
      run: npx playwright test e2e/smoke-navigation.spec.ts --project=chromium --reporter=line

  # Sharded functional E2E (leftovers A11). The deterministic functional set is
  # split across a 2-way matrix (`--shard=i/2`); each matrix leg is its own
  # runner with its own setup, server, and freshly-seeded throwaway DB (seeded by
  # playwright.config.ts's webServer command per server start), so cross-shard is
  # clean by construction and within-shard serial order-safety (fullyParallel:
  # false / workers:1) is unchanged. These per-shard contexts ("E2E Functional
  # Shard 1/2", "E2E Functional Shard 2/2") are NOT branch-protection required
  # checks — the single required context "E2E Functional (Chromium)" is preserved
  # by the e2e-functional fan-in gate below. fail-fast:false so a red in one shard
  # still lets the other finish (full failure picture + both artifacts).
  e2e-functional-shard:
    name: E2E Functional Shard ${{ matrix.shard }}/2
    runs-on: ubuntu-latest
    needs: frontend-build
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install npm dependencies
      run: npm ci

    - name: Build Bootstrap-customized CSS
      run: npm run build:css

    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    # Deterministic functional/product specs only. Excluded by design (see
    # e2e/CLAUDE.md "CI inclusion contract"): visual + visual-baseline-thumbnails
    # (cross-OS rendering), and program-backup (runs isolated in e2e-backup).
    # accessibility + fatigue-stage4-smokes +
    # volume-progress were promoted here in A10 after a 5x-repeat ubuntu stability
    # probe (225/225 green, zero flakes). nav-dropdown was promoted after the
    # issue #8 1440px actionability fix; sharding remains `--shard=${{ matrix.shard }}/2`.
    # No --reporter flag: the CI-gated reporters in playwright.config.ts (list +
    # html + junit) must all emit so the artifact upload below has a report.
    - name: Run functional specs (shard ${{ matrix.shard }}/2)
      run: |
        npx playwright test --project=chromium --shard=${{ matrix.shard }}/2 \
          e2e/accessibility.spec.ts \
          e2e/api-integration.spec.ts \
          e2e/body-composition.spec.ts \
          e2e/browser-navigation-state.spec.ts \
          e2e/dark-mode.spec.ts \
          e2e/empty-states.spec.ts \
          e2e/error-handling.spec.ts \
          e2e/exercise-interactions.spec.ts \
          e2e/fatigue-stage4-smokes.spec.ts \
          e2e/fatigue.spec.ts \
          e2e/learned-calibration.spec.ts \
          e2e/nav-dropdown.spec.ts \
          e2e/progression.spec.ts \
          e2e/replace-exercise-errors.spec.ts \
          e2e/smoke-navigation.spec.ts \
          e2e/summary-pages.spec.ts \
          e2e/superset-edge-cases.spec.ts \
          e2e/ui-hardening.spec.ts \
          e2e/user-profile.spec.ts \
          e2e/validation-boundary.spec.ts \
          e2e/volume-progress.spec.ts \
          e2e/volume-splitter.spec.ts \
          e2e/workout-log.spec.ts \
          e2e/workout-plan.spec.ts

    - name: Upload Playwright artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-functional-shard-${{ matrix.shard }}-of-2
        path: artifacts/playwright
        retention-days: 7

  # Fan-in gate (leftovers A11). This job is the SINGLE branch-protection
  # required status check for functional E2E — its name "E2E Functional
  # (Chromium)" must stay byte-for-byte (renaming it orphans the required check
  # and blocks every PR; same rule as the typecheck job). It contains no test
  # logic: it just aggregates the matrix result. `needs.<matrix-job>.result` is
  # 'success' only when ALL shards succeeded, so this gate is green iff both
  # shards passed. `if: always()` makes the gate run (and post its status) even
  # when a shard fails, so the required check turns red instead of staying
  # pending. Do NOT add the per-shard "E2E Functional Shard i/2" contexts to
  # branch protection — this gate is the contract.
  e2e-functional:
    name: E2E Functional (Chromium)
    runs-on: ubuntu-latest
    needs: e2e-functional-shard
    if: always()

    steps:
    - name: Require all functional shards to pass
      run: |
        result="${{ needs.e2e-functional-shard.result }}"
        echo "e2e-functional-shard matrix aggregate result: $result"
        if [ "$result" != "success" ]; then
          echo "::error title=E2E Functional gate::One or more E2E Functional shards did not pass (result=$result)"
          exit 1
        fi
        echo "All E2E Functional shards passed."

  e2e-backup:
    name: E2E Backup (Chromium, isolated)
    runs-on: ubuntu-latest
    needs: frontend-build

    # program-backup.spec.ts performs live backup/restore mutations. It runs in
    # its OWN job so it gets a fresh server + freshly-seeded throwaway DB,
    # sidestepping the documented sequential-DB pollution flake without any
    # between-spec reset mechanism. See e2e/CLAUDE.md.
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install npm dependencies
      run: npm ci

    - name: Build Bootstrap-customized CSS
      run: npm run build:css

    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    - name: Run backup spec
      run: npx playwright test e2e/program-backup.spec.ts --project=chromium

    - name: Upload Playwright artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-backup
        path: artifacts/playwright
        retention-days: 7

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run pytest
      run: |
        pytest tests/ -v --tb=short --junitxml=artifacts/pytest/junit.xml
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Upload pytest JUnit XML
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-junit
        path: artifacts/pytest/junit.xml
        retention-days: 7

  # NOTE: the former `dependency-check` job (outdated/safety scans) moved to the
  # manual Deep Gate (.github/workflows/deep-gate.yml) in Phase 4.5 — it's
  # informational and doesn't belong on the required PR path. It was never a
  # required status check, so branch protection is unaffected.

  # Static typing gate (Phase 3, docs/ci_cd_phase3/PLANNING.md).
  #   tsc --noEmit -> BLOCKING (backlog cleared to 0 in the tsc fast-follow).
  #   pyright      -> count is still surfaced measure-only to the job summary +
  #                   artifact (full backlog), AND gated blocking via a
  #                   baseline-allowlist (leftovers A9): the committed baseline
  #                   docs/ci_cd_phase3/pyright-baseline.json allowlists the
  #                   existing backlog; scripts/pyright_baseline_diff.py fails the
  #                   job only on NET-NEW diagnostics. Existing errors never red
  #                   the build; a regression does.
  # The recorded pyright count is 1.1.410 under the committed pyrightconfig.json
  # (py3.11 + Windows platform — pythonVersion aligned to the CI runtime, A12).
  # The baseline-diff keys on file+rule+message+
  # severity (repo-relative POSIX path), counted as a multiset, so it reproduces
  # across Windows/Linux. Regenerate the baseline with --write-baseline when an
  # intentional, reviewed change shifts the backlog.
  typecheck:
    # NOTE: this job name is a branch-protection *required status check* context —
    # keep it byte-for-byte ("Type Check (tsc blocking + pyright measure-only)").
    # Renaming it orphans the required check and blocks every PR. pyright is now
    # also baseline-gated (see the blocking diff step below); the name stays for
    # protection-matching, not because pyright is purely measure-only.
    name: Type Check (tsc blocking + pyright measure-only)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        # Aligned to the CI runtime python (3.11) so pyright type-checks against
        # the version the tests actually run on (A12 reconcile). Diagnostic set is
        # identical under 3.11 vs the prior 3.12 (verified: 190 diags, 0 delta).
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # pyrightconfig.json pins venv ".venv"; create + populate it so pyright
    # resolves third-party imports the same way it does on the developer's box.
    - name: Create .venv and install Python dependencies
      run: |
        python -m venv .venv
        .venv/bin/python -m pip install --upgrade pip
        .venv/bin/python -m pip install -r requirements.txt

    - name: Install npm dependencies
      run: npm ci

    - name: pyright (measure-only count)
      continue-on-error: true
      run: |
        npx pyright@1.1.410 --outputjson > pyright.json 2> pyright.stderr.txt || true
        COUNT=$(python -c "import json; print(json.load(open('pyright.json'))['summary']['errorCount'])" 2>/dev/null || echo "unknown")
        echo "::notice title=pyright (measure-only count)::pyright 1.1.410 reported $COUNT errors (py3.11 config); the baseline-diff step gates NET-NEW errors only"
        {
          echo "### pyright (measure-only count + baseline-gated)"
          echo "- **total errors**: $COUNT (pyright 1.1.410, py3.11 + Windows-platform config)"
          echo "- Blocking gate: net-new vs docs/ci_cd_phase3/pyright-baseline.json (next step)."
        } >> "$GITHUB_STEP_SUMMARY"

    # BLOCKING (leftovers A9): fail only on NET-NEW pyright diagnostics vs the
    # committed baseline. Consumes pyright.json from the measure-only step above
    # (written even though that step is continue-on-error). The committed baseline
    # allowlists the existing backlog, so this never reds the build on current
    # code — only a regression (new error or an increased count for a key) fails.
    - name: pyright baseline diff (blocking)
      run: |
        python scripts/pyright_baseline_diff.py \
          --current pyright.json \
          --baseline docs/ci_cd_phase3/pyright-baseline.json

    # BLOCKING: backlog was cleared to 0 in the tsc fast-follow. A non-zero count
    # fails the job. The count is still written to the summary + uploaded (the
    # artifact step is if: always()) so a regression shows what broke.
    - name: tsc --noEmit (blocking)
      run: |
        set +e
        npx tsc --noEmit > tsc.txt 2>&1
        STATUS=$?
        set -e
        COUNT=$(grep -cE "error TS[0-9]+" tsc.txt || true)
        echo "::notice title=tsc (blocking)::tsc --noEmit reported $COUNT errors (e2e + playwright.config.ts scope)"
        {
          echo "### tsc --noEmit (blocking)"
          echo "- **errors**: $COUNT (scope: e2e specs + playwright.config.ts; app JS under static/js/modules/* is NOT covered)"
        } >> "$GITHUB_STEP_SUMMARY"
        cat tsc.txt
        exit $STATUS

    - name: Upload static-analysis outputs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: static-analysis-typecheck
        path: |
          pyright.json
          tsc.txt
        retention-days: 14

